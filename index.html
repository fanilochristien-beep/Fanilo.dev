<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio-fanilo</title>
</head>
<body>
    
    <nav class="navbar">
        <h2 class="logo">Fanilo.dev</h2>
        <ul nav-links>
            <li><a href="index.html">Acceuil</a></li>
            <li><a href="about.html"> A propos</a></li>
            <li><a href="projet.html">Projet</a></li>
            <li><a href="cv.html">CV</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text"><h1 class="hero-title">Etudiant en Informatique Université de Fianarantsoa</h1>
            <p class="typing"></p>
            <div class="bouttons">
                <a href="projet.html" class="btn">Voir mes projets</a>
                <a href="cv.html" class="btn btn-outline">Mon CV</a>
            </div>
        </div>

        <div class="hero-image">
            <img src="image/image1.png" alt="#">
        </div>
    </section>

    <footer>
        <p>Fanilo Christien R.</p>
    </footer>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .navbar{
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            align-items: center;
            animation: fadeDown 1s ease;
        }

        .logo{
            color: #0ff;
        }

        .nav-links{
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a{
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .nav-links a:hover{
            color: #0ff;
        }

        .hero{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 100px;
            min-height: 90vh;
        }

        .hero-text{
            max-width: 500px;
        }

        .hero-title{
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(90deg, #0ff, #fff, #0ff);
            background-size: 200%;
            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite, float3D 4s ease-in-out infinite;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6);
        }

        .typing{
            margin-top: 15px;
            font-size: 20px;
            color: #0ff;
            height: 30px;
        }

        .buttons{
            margin-top: 20px;
        }

        .btn{
            padding: 10px 20px;
            background: #0ff;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 10px;
            transition: 0.3s;
        }

        .btn:hover{
            background: white;
        }

        .btn-outline{
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
        }

        .hero-image img{
            width: 350px;
            animation: float 3s ease-in-out infinite;
        }

        footer{
            text-align: center;
            padding: 20px;
            background: #0f2027;
        }

        @keyframes fadeDown{
            from{opacity: 0; transform: translateY(-30px);}
            to{opacity: 1; transform: translateY(0);}
        }

        @keyframes gradientMove{
            0%{background-position: 0%;}
            100%{background-position: 200%;}
        }

        @keyframes float3D{
            0%{transform: rotateX(0deg) rotateY(0deg);}
            50%{transform: rotateX(8deg) rotateX(8deg);}
            100%{transform: rotateX(0deg) rotateX(0deg);}
        }

        @keyframes float{
            0%{transform: translateY(0);}
            50%{transform: translateY(-15px);}
            100%{transform: translateY(0);}
        }

        @media(max-width: 900px){
            .hero{
                flex-direction: column;
                text-align: center;
            }

            .hero-image img{
                width: 250px;
                margin-top: 30px;
            }
        }
    </style>

    <script>
        const text = "Passionné par le développement web et la programmation.";
        let index = 0;

        function typeEffect(){
            if(index < text.length){

                document.querySelector('typing').innerHTML += text.charAt(index); index++;
                setTimeout(typeEffect, 50)
            }
        }

        window.onload = typeEffect;
    </script>

</body>
</html>
